---
apiVersion: v1
kind: Service
metadata:
  name: external-kube-api
  namespace: default
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.88
  ports:
    - name: https
      port: 6443
      targetPort: 6443
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-kube-api
  namespace: default
subsets:
  - addresses:
      - ip: 192.168.3.50
      - ip: 192.168.3.60
      - ip: 192.168.3.70
    ports:
      - name: https
        port: 6443
        protocol: TCP